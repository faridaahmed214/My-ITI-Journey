<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Cyberpunk Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <div class="game-wrapper">
      <header class="game-header">
        <div class="game-info">
          <span>Moves: <b id="moves-count">0</b></span>
          <button id="restart-btn" class="btn">Restart Game</button>
        </div>
      </header>

      <main class="game-main">
        <div id="game-board" class="grid-container"></div>
      </main>

      <div id="game-over-overlay" class="overlay hidden">
        <div class="overlay-content">
          <h2 class="game-over-text">Game Over</h2>
          <p>All Matches Found!</p>
          <button id="play-again-btn" class="btn">Play Again</button>
        </div>
      </div>
    </div>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
