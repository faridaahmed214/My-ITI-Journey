<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <title>Document</title>
  </head>
  <body>
    <section class="form-container">
      <h2>Contact Information</h2>
      <form class="custom-form">
        <div class="grid-row">
          <div class="field col-12 col-md-6 col-lg-4">
            <label>First Name</label>
            <input type="text" placeholder="e.g. Farida" />
          </div>
          <div class="field col-12 col-md-6 col-lg-4">
            <label>Last Name</label>
            <input type="text" placeholder="e.g. Ahmed" />
          </div>
          <div class="field col-12 col-md-6 col-lg-4">
            <label>Email Address</label>
            <input type="email" placeholder="name@example.com" />
          </div>
          <div class="field col-12 col-md-6 col-lg-4">
            <label>Phone Number</label>
            <input type="tel" placeholder="+20..." />
          </div>
          <div class="field col-12 col-md-6 col-lg-4">
            <label>City</label>
            <input type="text" placeholder="Cairo" />
          </div>
          <div class="field col-12 col-md-6 col-lg-4">
            <label>Subject</label>
            <input type="text" placeholder="Software Development" />
          </div>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
      </form>
    </section>
  </body>
</html>
