<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Poppins", sans-serif;
            background-color: #1a1a2e; 
            color: #f8f9fa;
            padding: 20px;
            overflow-x: hidden;
        }

        .p-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .a1, .a2, .a3, .a4, .a5, .a6, .a7, .a8, .a9, .a10 {
            padding: 35px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .a1 {
            grid-column: 1 /-1;
            background-color: #16213e;
            flex-direction: row;
            justify-content: space-between;
            color: #fb7185;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .mobile-profile-img {
            display: none;
        }

        .a2 {
            grid-column: 1 / 3;
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            align-items: flex-start;
            text-align: left;
        }

        .a2 h1 {
            color: #fb7185;
            margin-bottom: 10px;
        }

        .a3 {
            grid-column: 3 / -1;
            background-color: #fb7185;
            padding: 0;
            overflow: hidden;
        }

        .profile-img-desktop {
            width: 100%;
            height: 100%;
        }

        .profile-img-desktop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .a4, .a5, .a6 {
            background-color: #0f3460;
            height: 220px;
            color: #4cc9f0;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .a7, .a8, .a9 {
            background-color: #16213e;
            height: 120px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .a10 {
            grid-column: 1 / 4;
            background-color: #16213e;
            font-size: 0.8rem;
        }

        @media (max-width: 850px) {
            .p-container {
                grid-template-columns: 1fr; 
            }

            .a1, .a2, .a3, .a4, .a5, .a6, .a7, .a8, .a9, .a10 {
                grid-column: 1 / 2;
            }

            .mobile-profile-img {
                display: block;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                overflow: hidden;
                border: 2px solid #fb7185;
            }

            .mobile-profile-img img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .a3 {
                display: none;
            }

            .a1 {
                flex-direction: row;
                padding: 15px 25px;
            }

            .a2 {
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="p-container">
        <header class="a1">
            <div class="header-left">
                <div class="mobile-profile-img">
                    <img src="farida.jpeg" alt="Farida Profile">
                </div>
                <div class="logo">Farida</div>
            </div>
            <nav>Work | About</nav>
        </header>

        <section class="a2">
            <h1>Hi, I'm Farida 👩‍💻</h1>
            <p>
                Full-stack web developer student at ITI. 
                Passionate about building digital products like 
                <strong>Yashmy</strong>, <strong>Vredict</strong>, and <strong>Sakina</strong>.
            </p>
        </section>

        <section class="a3">
            <div class="profile-img-desktop">
                <img src="farida.jpeg" alt="Farida Profile">
            </div>
        </section>

        <div class="a4">PROJECT: YASHMY</div>
        <div class="a5">PROJECT: VREDICT</div>
        <div class="a6">PROJECT: SAKINA</div>

        <div class="a7">JavaScript </div>
        <div class="a8">CSS</div>
        <div class="a9">UI/UX</div>

        <footer class="a10">Designed & Coded by Farida Ahmed © 2026</footer>
    </div>

</body>
</html>
