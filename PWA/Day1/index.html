<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سكينة - أذكار المسلم</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div class="container">
      <h1 class="logo">سكينة</h1>
      <p class="subtitle">أذكارك دائماً معك، في كل وقت ومكان.</p>

      <button id="installBtn" class="btn-install" style="display: none">
        تثبيت التطبيق
      </button>

      <div class="cards-container">
        <div class="azkar-card">
          <h3>أذكار الصباح</h3>
          <p>"اللهم بك أصبحنا وبك أمسينا..."</p>
        </div>

        <div class="azkar-card">
          <h3>أذكار المساء</h3>
          <p>"أمسينـا وأمسـى الملك لله..."</p>
        </div>
      </div>

      <p class="hint">جرب فصل الإنترنت لتختبر ميزة التصفح "أوفلاين"!</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
