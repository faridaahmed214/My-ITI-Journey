<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Shapes - Canvas</title>
    <style>
        :root {
            --primary-color: #3b6f91;
            --dark-color: #15232d;
            --light-bg: #f4f7f9;
            --text-color: #ffffff;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--dark-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--primary-color);
            text-transform: uppercase;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        canvas {
            background-color: var(--light-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(59, 111, 145, 0.3); 
            border: 4px solid var(--primary-color);
        }
    </style>
</head>
<body>

    <h2>Geometric Shapes - Canvas</h2>
    <canvas id="myCanvas" width="800" height="500"></canvas>

    <script>
        class Polygon {
            constructor(x, y, ...sides) {
                if (this.constructor === Polygon) {
                    throw new Error("Abstract class 'Polygon' cannot be instantiated directly.");
                }
                this.x = x;
                this.y = y;
                this.sides = sides;
            }

            getArea() { return 0; }
            getPerimeter() { return 0; }
            draw(ctx) { console.warn("Draw method not implemented."); }

            toString() {
                return `${this.constructor.name}`;
            }


        }

        class Rectangle extends Polygon {
            constructor(x, y, width, height) {
                super(x, y, width, height);
                this.width = width;
                this.height = height;
            }

            getArea() { return this.width * this.height; }
            getPerimeter() { return 2 * (this.width + this.height); }

            draw(ctx) {
                ctx.beginPath();
                ctx.rect(this.x, this.y, this.width, this.height);
                
                ctx.fillStyle = "#3b6f91"; 
                ctx.fill();
                
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#15232d";
                ctx.stroke();
                ctx.closePath();

            }
        }

        class Square extends Polygon {
            constructor(x, y, side) {
                super(x, y, side);
                this.side = side;
            }

            getArea() { return this.side * this.side; }
            getPerimeter() { return 4 * this.side; }

            draw(ctx) {
                ctx.beginPath();
                ctx.rect(this.x, this.y, this.side, this.side);
                
                ctx.fillStyle = "rgba(59, 111, 145, 0.7)"; 
                ctx.fill();
                
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#15232d";
                ctx.stroke();
                ctx.closePath();

            }
        }

        class Circle extends Polygon {
            constructor(x, y, radius) {
                super(x, y, radius);
                this.radius = radius;
            }

            getArea() { return Math.PI * this.radius * this.radius; }
            getPerimeter() { return 2 * Math.PI * this.radius; }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                let gradient = ctx.createRadialGradient(this.x, this.y, 5, this.x, this.y, this.radius);
                gradient.addColorStop(0, "#5a8bb0");
                gradient.addColorStop(1, "#3b6f91"); 
                
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#15232d";
                ctx.stroke();
                ctx.closePath();

                ctx.fillStyle = "#15232d";
                ctx.font = "bold 14px Segoe UI";
            }
        }

        class Triangle extends Polygon {
            constructor(x, y, sideA, sideB, sideC) {
                super(x, y, sideA, sideB, sideC);
                this.sideA = sideA;
                this.sideB = sideB;
                this.sideC = sideC;
            }

            getArea() {
                const s = this.getPerimeter() / 2;
                return Math.sqrt(s * (s - this.sideA) * (s - this.sideB) * (s - this.sideC));
            }

            getPerimeter() {
                return this.sideA + this.sideB + this.sideC;
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y); 
                ctx.lineTo(this.x + this.sideA, this.y); 
                
                const heightApprox = Math.min(this.sideB, this.sideC); 
                ctx.lineTo(this.x + (this.sideA / 2), this.y + heightApprox);
                
                ctx.closePath();

                ctx.fillStyle = "#2c3e50";
                ctx.fill();
                
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#15232d";
                ctx.stroke();
                
            }
        }

        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");

        const rect = new Rectangle(50, 100, 150, 100);
        rect.draw(ctx);

        const square = new Square(250, 100, 100);
        square.draw(ctx);

        const circ = new Circle(480, 150, 50);
        circ.draw(ctx);

        const tri = new Triangle(600, 100, 100, 100, 100); 
        tri.draw(ctx);

    </script>
</body>
</html>
