<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: #15232d;
        color: white;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        height: 100vh;
        position: relative;
      }

      form {
        background-color: #1e3240;
        padding: 40px;
        width: 320px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        position: absolute;
        top: 35%;
        left: 35%;
      }

      .input-group {
        margin-bottom: 20px;
        position: relative;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #88cfd8;
      }

      input[type="text"],
      input[type="email"] {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 2px solid transparent;
        background-color: #f0f4f8;
        box-sizing: border-box;
        font-size: 14px;
        outline: none;
      }

      input:focus:valid {
        border-color: #2ecc71;
        background-color: #e8f8f5;
      }

      input:focus:invalid {
        border-color: #e74c3c;
        background-color: #fadbd8;
      }

      .error-text {
        display: none;
        color: #e74c3c;
        font-size: 12px;
        margin-top: 5px;
        font-weight: bold;
      }

      input:focus:invalid + .error-text {
        display: block;
      }
      input[type="submit"] {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background-color: #2a6f68 !important;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <form>
      <div class="input-group">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="farida ahmed"
          pattern="[a-zA-Z\s]{3,}"
          required
        />
        <span class="error-text">Name must be at least 3 letters</span>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="example@gmail.com"
          pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
          required
        />
        <span class="error-text">Please enter a valid email address</span>
      </div>

      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
