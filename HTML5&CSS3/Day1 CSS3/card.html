<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0f0f0;
            padding-top: 50px;
            text-align: center;
        }

        .card {
            width: 320px;
            height: 450px;
            background-color: white;
            border: 8px solid red;
            border-radius: 40px;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .letter {
            font-size: 60px;
            font-family: 'Rye';
            position: absolute;
            line-height: 1;
            text-shadow: 4px 3px 0px #b5d5da;
        }

        .top-left {
            top: 20px;
            left: 20px;
        }

        .bottom-right {
            bottom: 20px;
            right: 20px;
            transform: rotate(180deg);
        }

        .spade-container {
            position: absolute;
            top: 170px;
            left: 110px;
        }

        #heart {
            position: relative;
            width: 100px;
            height: 90px;
            transform: rotate(180deg);
        }

        #heart:before,
        #heart:after {
            position: absolute;
            content: "";
            left: 50px;
            top: 0;
            width: 50px;
            height: 80px;
            background: black;
            border-radius: 50px 50px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        #heart:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        #triangle-up {
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid black;
            position: absolute;
            bottom: -15px;
            left: 25px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="letter top-left">A</div>

        <div class="spade-container">
            <div id="heart"></div>
            <div id="triangle-up"></div>
        </div>

        <div class="letter bottom-right">A</div>
    </div>

</body>
</html>
