<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: #f0f4f8;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        padding-top: 80px;
      }

      div {
        width: 400px;
        margin: 0 auto;
        background-color: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      img {
        width: 250px;
        height: 250px;
        border-radius: 100%;
        border: 5px dashed #3b9188;
        transition: opacity 0.5s;
      }

      img:hover {
        opacity: 0.3;
      }

      p {
        font-size: 18px;
        margin-top: 25px;
        background-color: #e6f2ff;
        color: #15232d;
        padding: 15px;
        border-radius: 10px;
        border: 2px solid transparent;
        transition: all 0.3s ;
      }

      p:hover {
        background-color: #3b9188;
        color: white;
        box-shadow: 2px 10px 30px rgba(59, 145, 136, 0.6);
      }
    </style>
  </head>
  <body>
    <div>
      <img src="logo.png" alt="Profile Picture" />
      <p>Hover over the image to see the effect.</p>
    </div>
  </body>
</html>
