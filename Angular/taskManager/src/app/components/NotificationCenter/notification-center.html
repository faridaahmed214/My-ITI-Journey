<div class="notification-center">
  <div class="nc-header">
    <h3>Notifications</h3>
    <div class="nc-actions">
      <button (click)="markAllAsRead()" *ngIf="notifications().length > 0">Mark all as read</button>
      <button (click)="clearAll()" class="clear-btn" *ngIf="notifications().length > 0">Clear</button>
    </div>
  </div>

  <div class="nc-body">
    <div *ngIf="notifications().length === 0" class="empty-state">
      <div class="empty-icon">🔔</div>
      <p>No notifications yet</p>
    </div>

    <div 
      *ngFor="let note of notifications()" 
      class="notification-item" 
      [class.unread]="!note.isRead"
      [ngClass]="'type-' + note.type"
    >
      <div class="note-icon">
        <ng-container [ngSwitch]="note.type">
          <svg *ngSwitchCase="'success'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          <svg *ngSwitchCase="'error'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          <svg *ngSwitchCase="'warning'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          <svg *ngSwitchCase="'info'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          <svg *ngSwitchDefault width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>
        </ng-container>
      </div>
      <div class="note-content">
        <p class="note-message">{{ note.message }}</p>
        <span class="note-time">{{ getTimeLabel(note.time) }}</span>
      </div>
      <div class="unread-dot" *ngIf="!note.isRead"></div>
    </div>
  </div>
</div>
