<header class="header">
  <div class="container">
    <button class="mobile-menu-toggle" (click)="isMobileMenuOpen = !isMobileMenuOpen">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <div class="logo">
      <span class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
      <h1>Task Manager</h1>
    </div>
    
    <nav class="nav desktop-nav">
      <ul>
        <li><a routerLink="/home" routerLinkActive="active">Home</a></li>
        <li><a routerLink="/dashboard" routerLinkActive="active">Dashboard</a></li>
        <li><a routerLink="/add-task" routerLinkActive="active">Add Task</a></li>
      </ul>
    </nav>

    <div class="header-right-group">
      <div class="session-timer desktop-only" title="Session Uptime">
        <span class="timer-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></span>
        <span class="timer-value">{{ timerDisplay }}</span>
      </div>
      <div class="header-actions">
        <button
          class="notification-bell"
          (click)="toggleNotificationCenter()"
          [class.has-unread]="unreadCount() > 0"
        >
          <svg class="bell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="unread-badge" *ngIf="unreadCount() > 0">
            {{ unreadCount() }}
          </span>
        </button>
        <app-notification-center
          *ngIf="isNotificationCenterOpen"
        ></app-notification-center>
      </div>
      <div class="avatar" (click)="isUserSidebarOpen = true">{{ userInitials }}</div>
    </div>
  </div>
</header>


<div class="mobile-overlay" *ngIf="isMobileMenuOpen" (click)="isMobileMenuOpen = false"></div>
<nav class="mobile-nav" [class.open]="isMobileMenuOpen">
  <button class="close-mobile-nav" (click)="isMobileMenuOpen = false">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
  </button>
  <ul class="mobile-nav-list">
    <li><a routerLink="/home" routerLinkActive="active" (click)="isMobileMenuOpen = false">Home</a></li>
    <li><a routerLink="/dashboard" routerLinkActive="active" (click)="isMobileMenuOpen = false">Dashboard</a></li>
    <li><a routerLink="/add-task" routerLinkActive="active" (click)="isMobileMenuOpen = false">Add Task</a></li>
  </ul>
</nav>

<app-user-sidebar
  *ngIf="isUserSidebarOpen"
  (close)="isUserSidebarOpen = false"
  (logout)="logout()">
</app-user-sidebar>
